name: Laravel CI/CD Pipeline (Hestia Runner)

on:
  push:
    branches:
      - "main"          # Production branch
  pull_request:
    branches:
      - "main"

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      # 🧩 Step 1: Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # ⚙️ Step 2: Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, intl, pdo_mysql, openssl, xml, ctype, json, tokenizer, fileinfo, sodium
          coverage: none

      # 🧰 Step 3: Validate and install dependencies
      - name: Validate composer.json
        run: composer validate --strict

      - name: Cache Composer dependencies
        id: composer-cache
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      # 🧠 Step 4: Prepare Laravel environment for build
      - name: Prepare Laravel environment
        run: |
          if [ -f .env ]; then
            echo ".env already exists"
          elif [ -f .env.example ]; then
            cp .env.example .env
          else
            echo "Creating minimal .env for CI..."
            printf "%s\n" \
              "APP_NAME=OPEN" \
              "APP_ENV=local" \
              "APP_KEY=" \
              "APP_DEBUG=true" \
              "APP_URL=http://localhost" \
              "LOG_CHANNEL=stack" \
              "DB_CONNECTION=sqlite" \
              "DB_DATABASE=:memory:" \
              "CACHE_DRIVER=file" \
              "QUEUE_CONNECTION=sync" \
              "SESSION_DRIVER=array" \
              "SESSION_LIFETIME=120" \
              > .env
          fi
          php artisan key:generate --force
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      - name: Create deploy artifact
        run: |
          rm -rf deploy-stage deploy.tar.gz
          mkdir -p deploy-stage
          rsync -a \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'node_modules/' \
            --exclude 'storage/logs/' \
            --exclude 'storage/framework/cache/' \
            --exclude 'storage/framework/sessions/' \
            --exclude 'storage/framework/views/' \
            --exclude 'bootstrap/cache/*.php' \
            ./ deploy-stage/
          tar -czf deploy.tar.gz -C deploy-stage .

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package
          path: deploy.tar.gz
          if-no-files-found: error

  deploy:
    name: Deploy to Hestia Server
    needs: build
    runs-on: [self-hosted, hestia]
    if: github.ref == 'refs/heads/main'
    env:
      DEPLOY_PATH: /home/vicezion/web/open.vicezion.com/public_html
    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-package

      - name: Preflight checks (PHP/Composer on runner)
        run: |
          set -e
          if ! command -v php >/dev/null 2>&1; then
            echo "ERROR: PHP CLI not found on self-hosted runner."
            echo "Install php8.2-cli (or appropriate version) on the server, then rerun."
            exit 1
          fi
          if ! command -v rsync >/dev/null 2>&1; then
            echo "ERROR: rsync not found on self-hosted runner."
            exit 1
          fi
          if ! command -v tar >/dev/null 2>&1; then
            echo "ERROR: tar not found on self-hosted runner."
            exit 1
          fi
          php -v

      - name: Deploy Laravel project to Hestia
        run: |
          if [ ! -d "$DEPLOY_PATH" ]; then
            echo "ERROR: Deploy path not found: $DEPLOY_PATH"
            exit 1
          fi
          rm -rf deploy-package
          mkdir -p deploy-package
          tar -xzf deploy.tar.gz -C deploy-package
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.env' \
            --exclude 'node_modules/' \
            --exclude 'storage/' \
            --exclude 'bootstrap/cache/' \
            deploy-package/ "$DEPLOY_PATH"/
          cd "$DEPLOY_PATH"
          php artisan migrate --force --graceful
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          sudo systemctl reload php8.2-fpm || true
          sudo systemctl reload nginx || true
          echo "✅ Deployment completed successfully!"
