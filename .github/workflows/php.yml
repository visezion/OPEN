name: Laravel CI/CD Pipeline (Hestia Runner)

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality_gate:
    name: Quality Gate (Composer + Tests + Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, bcmath, intl, pdo_mysql, pdo_sqlite, openssl, xml, ctype, json, tokenizer, fileinfo, sodium
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Validate composer.json
        run: composer validate --strict

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            vendor
            ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare Laravel CI environment
        run: |
          cat > .env << 'EOF'
          APP_NAME=OPEN
          APP_ENV=testing
          APP_KEY=
          APP_DEBUG=true
          APP_URL=http://localhost
          LOG_CHANNEL=stack
          LOG_DEPRECATIONS_CHANNEL=null
          LOG_LEVEL=debug
          DB_CONNECTION=sqlite
          DB_DATABASE=database/database.sqlite
          BROADCAST_CONNECTION=log
          CACHE_STORE=array
          FILESYSTEM_DISK=local
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=array
          SESSION_LIFETIME=120
          MAIL_MAILER=array
          EOF
          php -r "file_exists('database/database.sqlite') || touch('database/database.sqlite');"
          php artisan key:generate --force
          php artisan migrate --force --graceful

      - name: Cache Laravel config/routes/views
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      - name: Run backend tests
        run: php artisan test --without-tty

      - name: Build frontend assets
        run: npm run build

  package:
    name: Create Deploy Artifact
    needs: quality_gate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, bcmath, intl, pdo_mysql, openssl, xml, ctype, json, tokenizer, fileinfo, sodium
          coverage: none

      - name: Install production Composer dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-progress --no-interaction

      - name: Create deploy artifact
        run: |
          rm -rf deploy-stage deploy.tar.gz
          mkdir -p deploy-stage
          rsync -a \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'node_modules/' \
            --exclude 'storage/logs/' \
            --exclude 'storage/framework/cache/' \
            --exclude 'storage/framework/sessions/' \
            --exclude 'storage/framework/views/' \
            --exclude 'bootstrap/cache/*.php' \
            ./ deploy-stage/
          tar -czf deploy.tar.gz -C deploy-stage .

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package
          path: deploy.tar.gz
          if-no-files-found: error

  deploy:
    name: Deploy to Hestia Server
    needs: package
    runs-on: [self-hosted, hestia]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      DEPLOY_PATH: /home/vicezion/web/open.vicezion.com/public_html

    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-package
          path: artifact

      - name: Preflight checks (PHP/Composer on runner)
        run: |
          set -e
          if ! command -v php >/dev/null 2>&1; then
            echo "ERROR: PHP CLI not found on self-hosted runner."
            echo "Install php8.2-cli (or appropriate version) on the server, then rerun."
            exit 1
          fi
          if ! command -v rsync >/dev/null 2>&1; then
            echo "ERROR: rsync not found on self-hosted runner."
            exit 1
          fi
          if ! command -v tar >/dev/null 2>&1; then
            echo "ERROR: tar not found on self-hosted runner."
            exit 1
          fi
          php -v

      - name: Deploy Laravel project to Hestia
        run: |
          set -e
          if [ ! -d "$DEPLOY_PATH" ]; then
            echo "ERROR: Deploy path not found: $DEPLOY_PATH"
            exit 1
          fi
          if [ ! -f "artifact/deploy.tar.gz" ]; then
            echo "ERROR: Deploy artifact not found at artifact/deploy.tar.gz"
            exit 1
          fi
          rm -rf deploy-package
          mkdir -p deploy-package
          tar -xzf artifact/deploy.tar.gz -C deploy-package
          rsync -az --delete --force \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.env' \
            --exclude 'node_modules/' \
            --exclude 'storage/' \
            --exclude 'bootstrap/cache/' \
            deploy-package/ "$DEPLOY_PATH"/
          cd "$DEPLOY_PATH"
          rm -f bootstrap/cache/*.php || true
          php artisan package:discover --ansi
          php artisan migrate --force --graceful
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          sudo systemctl reload php8.2-fpm || true
          sudo systemctl reload nginx || true
          echo "Deployment completed successfully."
