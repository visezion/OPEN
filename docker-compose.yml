services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: visezion/open:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: app
      LARAVEL_RUN_MIGRATIONS: "${LARAVEL_RUN_MIGRATIONS:-true}"
      LARAVEL_RUN_SEEDERS: "${LARAVEL_RUN_SEEDERS:-false}"
      LARAVEL_CACHE_CONFIG: "${LARAVEL_CACHE_CONFIG:-true}"
      LARAVEL_QUEUE_CONNECTION: "${QUEUE_CONNECTION:-redis}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./docker/entrypoint.sh:/usr/local/bin/open-entrypoint:ro
      - app_storage:/var/www/html/storage
      - app_uploads:/var/www/html/uploads

  queue:
    image: visezion/open:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: queue
      LARAVEL_RUN_MIGRATIONS: "false"
      LARAVEL_CACHE_CONFIG: "false"
      LARAVEL_QUEUE_CONNECTION: "${QUEUE_CONNECTION:-redis}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      app:
        condition: service_started
    volumes:
      - ./docker/entrypoint.sh:/usr/local/bin/open-entrypoint:ro
      - app_storage:/var/www/html/storage
      - app_uploads:/var/www/html/uploads

  scheduler:
    image: visezion/open:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: scheduler
      LARAVEL_RUN_MIGRATIONS: "false"
      LARAVEL_CACHE_CONFIG: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      app:
        condition: service_started
    volumes:
      - ./docker/entrypoint.sh:/usr/local/bin/open-entrypoint:ro
      - app_storage:/var/www/html/storage
      - app_uploads:/var/www/html/uploads

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-open}"
      MYSQL_USER: "${DB_USERNAME:-open}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-open_secret}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-root_secret}"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -u"${DB_USERNAME:-open}" -p"${DB_PASSWORD:-open_secret}" --silent
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_WEB_PORT:-8025}:8025"

volumes:
  app_storage:
  app_uploads:
  db_data:
  redis_data:
